name: swim_metrics
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.7+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.0.3

  # Pick image
  image_picker: ^1.2.0

  # Initial requirement
  shared_preferences: ^2.1.1
  url_launcher: ^6.3.2
  logger: ^2.0.1
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.0.1
  pin_code_fields: ^8.0.1
  printing: ^5.13.0
  pdf: ^3.11.0
  collection: ^1.18.0
  open_file: ^3.2.1


  # Google And Apple Sign in
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Firebase Account
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  crypto: ^3.0.3
  audioplayers: ^5.2.1

  shimmer:



  # For Localization
  intl: any
  flutter_localizations:
    sdk: flutter
  #webview_flutter: ^4.2.1
  #webview_flutter_android: ^4.2.1
  #webview_flutter_wkwebview: ^3.24.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0



flutter:


  uses-material-design: true
  generate: true


  assets:
    - assets/images/
    - assets/icons/
    - .env
    - assets/audio/stop_watch_audio.mp3
    - assets/font/Merriweather-font.ttf
    - assets/audio/press_audio.mp3


